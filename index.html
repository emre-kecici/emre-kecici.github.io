<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emre Keçici | Portfolyo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #0f172a; color: #ffffff; font-family: sans-serif; line-height: 1.6; }
        header { text-align: center; padding: 60px 20px; border-bottom: 2px solid #00e5ff; background: #1e3a8a; }
        h1 { color: #00e5ff; margin-bottom: 10px; font-size: 2.2rem; }
        .unvan { color: #b026ff; font-weight: bold; font-size: 1rem; text-transform: uppercase; margin-bottom: 20px; }
        .summary { color: #94a3b8; font-size: 0.95rem; max-width: 700px; margin: 0 auto 30px auto; }
        .contact-hub { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; }
        .contact-btn { background: #1e293b; border: 1px solid #00e5ff; color: #00e5ff; padding: 12px 15px; text-decoration: none; border-radius: 8px; font-weight: bold; font-size: 0.85rem; display: flex; align-items: center; gap: 8px; }
        
        .stats-grid { display: flex; justify-content: space-around; flex-wrap: wrap; gap: 20px; padding: 40px 20px; background: #1e293b; border-bottom: 1px solid rgba(0, 229, 255, 0.2); text-align: center; }
        .stat-card h3 { font-size: 2rem; color: #00e5ff; margin-bottom: 5px; }
        .stat-card p { font-size: 0.85rem; color: #94a3b8; }

        .container { max-width: 900px; margin: 40px auto; padding: 0 15px; }
        
        /* Sekme Sistemi */
        .tabs-header { display: flex; overflow-x: auto; gap: 10px; border-bottom: 1px solid #334155; margin-bottom: 20px; padding-bottom: 10px; }
        .tab-input { display: none; }
        .tab-label { color: #94a3b8; padding: 10px 15px; cursor: pointer; white-space: nowrap; font-weight: bold; font-size: 0.9rem; }
        .tab-content { display: none; background: #1e293b; padding: 25px; border-radius: 10px; border: 1px solid rgba(0, 229, 255, 0.2); }

        #tab1:checked ~ .tabs-header label[for="tab1"], #tab2:checked ~ .tabs-header label[for="tab2"], #tab3:checked ~ .tabs-header label[for="tab3"], #tab4:checked ~ .tabs-header label[for="tab4"] { color: #00e5ff; border-bottom: 2px solid #00e5ff; }
        #tab1:checked ~ .tab-content-container #content1, #tab2:checked ~ .tab-content-container #content2, #tab3:checked ~ .tab-content-container #content3, #tab4:checked ~ .tab-content-container #content4 { display: block; }

        .card h3 { color: #b026ff; margin-bottom: 15px; text-transform: uppercase; font-size: 1.2rem; }
        .card ul { list-style: none; }
        .card ul li { color: #94a3b8; font-size: 0.95rem; margin-bottom: 12px; display: flex; align-items: flex-start; }
        .card ul li::before { content: "◆"; margin-right: 12px; color: #00e5ff; font-weight: bold; }

        .tech-box { display: inline-block; background: #0f172a; border: 1px solid rgba(0, 229, 255, 0.3); padding: 8px 12px; border-radius: 5px; margin: 5px; font-size: 0.85rem; font-weight: bold; }

        footer { text-align: center; padding: 50px 20px; border-top: 1px solid rgba(0, 229, 255, 0.2); background: #02040a; }
        .footer-badges { display: flex; justify-content: center; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
        .secure-badge { border: 1px solid #10b981; color: #10b981; padding: 8px 14px; border-radius: 4px; font-size: 0.8rem; background: rgba(16, 185, 129, 0.05); }
    </style>
</head>
<body>

    <input type="radio" name="tabs" id="tab1" class="tab-input" checked>
    <input type="radio" name="tabs" id="tab2" class="tab-input">
    <input type="radio" name="tabs" id="tab3" class="tab-input">
    <input type="radio" name="tabs" id="tab4" class="tab-input">

    <header id="top">
