    <style>
        :root {
            --bg-primary: #030712;
            --bg-secondary: #0b1329;
            --bg-card: #111a36;
            --cyan: #00e5ff;
            --purple: #b026ff;
            --text-high: #ffffff;
            --text-low: #9ca3af;
            --border: rgba(0, 229, 255, 0.15);
        }

        /* Tema Ayarları */
        .light-mode {
            --bg-primary: #f3f4f6;
            --bg-secondary: #ffffff;
            --bg-card: #f9fafb;
            --text-high: #111827;
            --text-low: #4b5563;
            --border: rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-high);
            font-family: 'Roboto', sans-serif;
            overflow-x: hidden;
            line-height: 1.6;
            transition: background 0.3s, color 0.3s;
        }

        /* Navigasyon Bar */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(11, 19, 41, 0.9);
            backdrop-filter: blur(5px);
            border-bottom: 1px solid var(--border);
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
        }

        .nav-logo {
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            color: var(--cyan);
            font-size: 1.1rem;
            letter-spacing: 1px;
        }

            border-radius: 4px;
            font-size: 0.8rem;
            cursor: pointer;
            font-family: 'Rajdhani', sans-serif;
            font-weight: bold;
        }
