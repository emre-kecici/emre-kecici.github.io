<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>emrekecici.com.tr</title>
    <style>
        /* Tüm sitenin ana görsel yapısı */
        body {
            background-color: #0d0d0d;
            color: #00ff00; /* Matrix yeşili dokunuşu */
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            flex-direction: column;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            width: 100%;
            border: 1px solid #333;
            padding: 40px;
            background: #1a1a1a;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.1);
            border-radius: 8px;
        }

        #typewriter {
            font-size: 22px;
            margin-bottom: 30px;
            min-height: 1.2em;
            border-right: 2px solid #00ff00;
            display: inline-block;
            white-space: pre-wrap;
        }

        .links-section {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 30px;
        }

        .btn {
            display: block;
            padding: 15px;
            color: #00ff00;
            text-decoration: none;
            border: 1px solid #00ff00;
            text-align: center;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: bold;
        }

        .btn:hover {
            background-color: #00ff00;
            color: #000;
            box-shadow: 0 0 15px #00ff00;
        }

        .footer {
            margin-top: 50px;
            font-size: 12px;
            color: #666;
        }

        /* Animasyonlar ve Diğer 300+ Satırlık Detayların Mantığı Burada Devam Ediyor */
        @keyframes blink {
            50% { border-color: transparent; }
        }
        
        /* Mobil Uyumluluk Ayarları */
        @media (max-width: 600px) {
            #typewriter { font-size: 18px; }
            .container { padding: 20px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="typewriter"></div>

        <div class="links-section">
            <a href="https://emre-kecici.github.io/CV_Emre_Kececi.pdf" class="btn">Özgeçmiş (CV) İndir</a>
            <a href="https://wa.me/905321234567" class="btn">WhatsApp İletişim</a>
            <a href="https://linkedin.com/in/emrekecici" class="btn">LinkedIn Profili</a>
        </div>

        <div class="footer">
            © 2026 emrekecici.com.tr | Dijital Dönüşüm Uzmanı
        </div>
    </div>

    <script>
        const text = "Dijital Dönüşüm Yolculuğu Başlıyor...\nSistemler optimize ediliyor...\nVeri yapıları kontrol ediliyor...\nBağlantı başarılı: emre-kecici.github.io";
        let i = 0;
        const speed = 50;

        function typeWriter() {
            if (i < text.length) {
                document.getElementById("typewriter").innerHTML += text.charAt(i);
                i++;
                setTimeout(typeWriter, speed);
            }
        }

        // Sayfa açıldığında daktiloyu başlat
        window.onload = typeWriter;
    </script>

</body>
</html>
