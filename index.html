        :root {
            --bg-primary: #030712;
            --bg-secondary: #0b1329;
            --bg-card: #111a36;
            --cyan: #00e5ff;
            --purple: #b026ff;
            --green: #10b981;
            --text-high: #ffffff;
            --text-low: #9ca3af;
            --border: rgba(0, 229, 255, 0.15);
        }

        .light-mode {
            --bg-primary: #f3f4f6;
            --bg-secondary: #ffffff;
            --bg-card: #f9fafb;
            --text-high: #111827;
            --text-low: #4b5563;
            --border: rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-high);
            font-family: system-ui, -apple-system, Arial, sans-serif;
            overflow-x: hidden;
            line-height: 1.6;
            transition: background 0.3s, color 0.3s;
        }

        /* --- Üst Menü & Tema --- */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(11, 19, 41, 0.85);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
        }

        .nav-logo {
            font-weight: bold;
            color: var(--cyan);
            font-size: 1.2rem;
            letter-spacing: 1px;
        }

        .nav-tools {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .theme-btn, .lang-btn {
            background: transparent;
            border: 1px solid var(--cyan);
            color: var(--cyan);
            padding: 6px 12px;
            border-radius: 5px;
            font-size: 0.8rem;
            cursor: pointer;
            font-weight: bold;
        }

            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 100px 20px 40px;
            background: radial-gradient(circle at center, #111a36 0%, var(--bg-primary) 80%);
            border-bottom: 1px solid var(--border);
        }
