<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emre Keçici | Profesyonel Portfolyo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0f172a; /* Gece Mavisi */
            color: #ffffff;
            font-family: sans-serif;
            line-height: 1.6;
        }

        header {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 80px 20px;
            background: linear-gradient(to bottom, #1e3a8a, #0f172a);
            border-bottom: 2px solid #00e5ff;
        }

        /* Harf harf yazma kurgusu */
        .typing-container {
            display: inline-block;
            position: relative;
            margin-bottom: 15px;
        }

        h1 {
            font-size: 2.2rem;
            color: #00e5ff;
            font-weight: bold;
            overflow: hidden;
            white-space: nowrap;
            max-width: fit-content;
            animation: typing 3s steps(12, end) forwards;
        }

        @keyframes typing {
            from { width: 0; }
            to { width: 100%; }
        }

        .unvan {
            font-size: 1rem;
            color: #b026ff;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        /* --- KANKA İŞTE O VURUCU VE KISA AÇIKLAMA --- */
        .summary {
            font-size: 0.9rem;
            color: #94a3b8;
            max-width: 90%;
            margin-bottom: 35px;
            text-align: center;
        }

        /* İletişim Butonları (Tek Satır Ortalı) */
        .contact-hub {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 40px;
            width: 100%;
            max-width: 350px;
        }

        .contact-btn {
            background: #1e293b;
            border: 1px solid #00e5ff;
            color: #00e5ff;
            padding: 12px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.8rem;
            width: 100%;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        /* Metrik Sayıları */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 20px;
            width: 100%;
            padding: 50px 20px;
            background: #1e293b;
            text-align: center;
            border-bottom: 1px solid rgba(0, 229, 255, 0.2);
        }

        .stat-card h3 {
            font-size: 2rem;
            color: #00e5ff;
            margin-bottom: 5px;
        }

        .stat-card p {
            font-size: 0.85rem;
            color: #94a3b8;
        }

        .container {
            padding: 60px 20px;
            max-width: 1100px;
            margin: 0 auto;
        }

        .sec-title {
            font-size: 1.6rem;
            color: #00e5ff;
            text-align: center;
            margin-bottom: 40px;
            text-transform: uppercase;
        }
