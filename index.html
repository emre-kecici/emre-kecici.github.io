<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emre Keçici | Dijital Süreç Mimarisi ve Yapay Zeka Sistemleri</title>
    <style>
        :root {
            --cyan: #00e5ff;
            --purple: #b026ff;
            --bg-deep: #0f172a;
            --bg-card: #1e293b;
            --text-high: #ffffff;
            --text-low: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-high);
            font-family: Arial, sans-serif;
            overflow-x: hidden;
            line-height: 1.6;
        }

        header {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 80px 20px;
            background: linear-gradient(to bottom, #1e3a8a, #0f172a);
            border-bottom: 2px solid var(--cyan);
        }

        /* Daktilo Animasyonu */
        .typing-container {
            display: inline-block;
            position: relative;
            margin-bottom: 15px;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: bold;
            background: linear-gradient(to right, var(--cyan), var(--purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            overflow: hidden;
            white-space: nowrap;
            max-width: fit-content;
            animation: typing 3s steps(12, end) forwards;
        }

        .cursor {
            position: absolute;
            right: -10px;
            top: 0;
            width: 3px;
            height: 100%;
            background-color: var(--cyan);
            animation: blink 0.75s step-end infinite, hideCursor 0s forwards 3s;
        }

        @keyframes typing { from { width: 0; } to { width: 100%; } }
        @keyframes blink { from, to { opacity: 0; } 50% { opacity: 1; } }
        @keyframes hideCursor { to { width: 0; opacity: 0; } }

        .unvan {
            font-size: 1rem;
            color: var(--cyan);
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        .summary {
            font-size: 0.95rem;
            color: var(--text-low);
            max-width: 85%;
            margin-bottom: 40px;
            text-align: center;
            line-height: 1.7;
        }

        /* Modern İletişim Butonları */
        .contact-hub {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 40px;
            width: 100%;
            max-width: 400px;
        }

        .contact-btn {
            background: var(--bg-card);
            border: 1px solid var(--cyan);
            color: var(--cyan);
            padding: 14px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.8rem;
            width: 100%;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: 0.3s;
        }

        .contact-btn:hover {
            border-color: var(--purple);
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.3);
        }

        /* Metriklerin Bölümü */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 20px;
            width: 100%;
            padding: 60px 20px;
            background: #1e293b;
            text-align: center;
            border-bottom: 1px solid rgba(0, 229, 255, 0.2);
        }

        .stat-card h3 {
            font-size: 2rem;
            color: var(--cyan);
            margin-bottom: 5px;
        }

        .stat-card p {
            font-size: 0.85rem;
            color: var(--text-low);
        }

        /* --- SEKMELİ KONTROLLÜ YAPI --- */

            padding: 60px 15px;
            max-width: 1100px;
            margin: 0 auto;
        }
