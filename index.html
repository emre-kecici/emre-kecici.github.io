<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emre Keçici | Portfolyo</title>
    <style>
        :root {
            --cyan: #00e5ff;
            --purple: #b026ff;
            --bg-deep: #0f172a;
            --bg-card: #1e293b;
            --text-high: #ffffff;
            --text-low: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-high);
            font-family: Arial, sans-serif;
            overflow-x: hidden;
            line-height: 1.6;
        }

        header {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 80px 20px;
            background: linear-gradient(to bottom, #1e3a8a, #0f172a);
            border-bottom: 2px solid var(--cyan);
        }

        .typing-container {
            display: inline-block;
            position: relative;
            margin-bottom: 15px;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: bold;
            background: linear-gradient(to right, var(--cyan), var(--purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            overflow: hidden;
            white-space: nowrap;
            max-width: fit-content;
            animation: typing 3s steps(12, end) forwards;
        }

        .cursor {
            position: absolute;
            right: -10px;
            top: 0;
            width: 3px;
            height: 100%;
            background-color: var(--cyan);
            animation: blink 0.75s step-end infinite, hideCursor 0s forwards 3s;
        }

        @keyframes typing { from { width: 0; } to { width: 100%; } }
        @keyframes blink { from, to { opacity: 0; } 50% { opacity: 1; } }
        @keyframes hideCursor { to { width: 0; opacity: 0; } }

        .unvan {
            font-size: 1rem;
            color: var(--cyan);
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        .summary {
            font-size: 0.95rem;
            color: var(--text-low);
            max-width: 85%;
            margin-bottom: 40px;
            text-align: center;
            line-height: 1.7;
        }

        .contact-hub {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 40px;
            width: 100%;
            max-width: 420px;
        }

        .contact-btn {
            background: var(--bg-card);
            border: 1px solid var(--cyan);
            color: var(--cyan);
            padding: 14px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.8rem;
            width: 100%;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: 0.3s;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 20px;
            width: 100%;
            padding: 60px 20px;
            background: #1e293b;
            text-align: center;
            border-bottom: 1px solid rgba(0, 229, 255, 0.2);
        }

        .stat-card h3 {
            font-size: 2.2rem;
            color: var(--cyan);
            margin-bottom: 5px;
        }

        .stat-card p {
            font-size: 0.85rem;
            color: var(--text-low);
        }

        .container {
            padding: 60px 15px;
            max-width: 1100px;
            margin: 0 auto;
        }

        .tabs-header {
            display: flex;
            overflow-x: auto;
            gap: 12px;
            border-bottom: 1px solid rgba(0, 229, 255, 0.2);
            margin-bottom: 30px;
            padding-bottom: 5px;
            -webkit-overflow-scrolling: touch;
        }

        .tab-input {
            display: none;
        }

        .tab-label {
            color: var(--text-low);
            padding: 12px 18px;
            cursor: pointer;
            white-space: nowrap;
            font-weight: bold;
            font-size: 0.9rem;
            transition: 0.2s;
            border-bottom: 2px solid transparent;
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #tab1:checked ~ .tabs-header label[for="tab1"],
        #tab2:checked ~ .tabs-header label[for="tab2"],
        #tab3:checked ~ .tabs-header label[for="tab3"],
        #tab4:checked ~ .tabs-header label[for="tab4"] {
            color: var(--cyan);
            border-bottom: 2px solid var(--cyan);
        }

        #tab1:checked ~ .tab-content-container #content1,
        #tab2:checked ~ .tab-content-container #content2,
        #tab3:checked ~ .tab-content-container #content3,
        #tab4:checked ~ .tab-content-container #content4 {
            display: block;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid rgba(0, 229, 255, 0.2);
            border-radius: 10px;
            padding: 30px;
            margin-bottom: 25px;
        }

        .card h3 {
            color: var(--purple);
            margin-bottom: 20px;
            font-size: 1.3rem;
            text-transform: uppercase;
            text-align: center;
        }

        .card ul {
            list-style: none;
            max-width: 90%;
            margin: 0 auto;
        }

        .card ul li {
            color: var(--text-low);
            font-size: 0.95rem;
            margin-bottom: 15px;
            display: flex;
            align-items: flex-start;
        }

        .card ul li::before {
            content: "◆";
            margin-right: 12px;
            color: var(--cyan);
            font-weight: bold;
        }

        .tech-box {
            display: inline-block;
            background: var(--bg-deep);
            border: 1px solid rgba(0, 229, 255, 0.3);
            padding: 10px 15px;
            border-radius: 5px;
            margin: 6px;
            font-size: 0.85rem;
            font-weight: bold;
        }

        footer {
            background: #02040a;
            padding: 50px 20px;
            text-align: center;
            border-top: 1px solid rgba(0, 229, 255, 0.2);
        }

        .footer-badges {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .secure-badge {
            border: 1px solid #10b981;
            color: #10b981;
            padding: 8px 14px;
            border-radius: 4px;
            font-size: 0.8rem;
            background: rgba(16, 185, 129, 0.05);
            height: 40px;
            white-space: nowrap;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

    <input type="radio" name="tabs" id="tab2" class="tab-input">
    <input type="radio" name="tabs" id="tab
