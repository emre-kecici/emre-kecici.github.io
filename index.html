<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emre Keçici | Web Geliştirme ve Otomasyon Uzmanı</title>
    <style>
        :root {
            --bg-primary: #030712;
            --bg-secondary: #0b1329;
            --bg-card: #111a36;
            --cyan: #00e5ff;
            --purple: #b026ff;
            --text-high: #ffffff;
            --text-low: #9ca3af;
            --border: rgba(0, 229, 255, 0.15);
        }

        .light-mode {
            --bg-primary: #f3f4f6;
            --bg-secondary: #ffffff;
            --bg-card: #f9fafb;
            --text-high: #111827;
            --text-low: #4b5563;
            --border: rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-high);
            font-family: system-ui, -apple-system, sans-serif;
            overflow-x: hidden;
            line-height: 1.5;
            transition: background 0.3s, color 0.3s;
        }

        nav {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(11, 19, 41, 0.9);
            backdrop-filter: blur(5px);
            border-bottom: 1px solid var(--border);
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
        }

        .nav-logo {
            font-weight: bold;
            color: var(--cyan);
            font-size: 1.1rem;
        }

        .theme-btn {
            background: transparent;
            border: 1px solid var(--cyan);
            color: var(--cyan);
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 0.8rem;
            cursor: pointer;
        }

        header {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 80px 15px 30px;
            background: radial-gradient(circle at center, #111a36 0%, var(--bg-primary) 80%);
            border-bottom: 1px solid var(--border);
        }

        h1 {
            font-size: 2.2rem;
            font-weight: bold;
            background: linear-gradient(to right, var(--cyan), var(--purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            width: 100%;
            word-wrap: break-word;
        }

        .unvan {
            font-size: 1rem;
            color: var(--cyan);
            font-weight: bold;
            margin-bottom: 15px;
            max-width: 90%;
            text-transform: uppercase;
        }

        .contact-box {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 25px;
            width: 100%;
            max-width: 350px;
            font-size: 0.85rem;
            text-align: left;
        }

        .contact-box a {
            color: var(--cyan);
            text-decoration: none;
            word-break: break-all;
        }
